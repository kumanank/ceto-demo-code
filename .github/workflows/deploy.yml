name: Deploy to Local

on:
  push:
    branches: [ main, feature/* ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: self-hosted
    
    steps:
    - name: Download code
      shell: powershell
      run: |
        [System.Net.ServicePointManager]::ServerCertificateValidationCallback = {$true}
        $url = "https://github.com/kumanank/ceto-demo-code/archive/refs/heads/main.zip"
        Invoke-WebRequest -Uri $url -OutFile code.zip -UseBasicParsing
        Expand-Archive -Path code.zip -DestinationPath . -Force
        Write-Host "Code downloaded successfully!"
    
    - name: Display deployment info
      shell: powershell
      run: |
        Write-Host "================================"
        Write-Host "DEPLOYMENT STARTED"
        Write-Host "================================"
        Write-Host "Branch: $env:GITHUB_REF_NAME"
        Write-Host "Commit: $env:GITHUB_SHA"
        Write-Host "Runner: $env:RUNNER_NAME"
        Write-Host "================================"
    
    - name: Build application
      shell: powershell
      run: |
        Write-Host "Building application..."
        Write-Host "Build completed successfully!"
    
    - name: Deploy to local environment
      shell: powershell
      run: |
        Write-Host "Deploying to local environment..."
        Write-Host "Deployment completed successfully!"
    
    - name: Deployment summary
      shell: powershell
      run: |
        Write-Host "================================"
        Write-Host "DEPLOYMENT SUCCESSFUL"
        Write-Host "================================"
